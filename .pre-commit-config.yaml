# Pre-commit hooks for automated code quality checks
# Install with: uvx pre-commit install
# Run manually: uvx pre-commit run --all-files

fail_fast: false

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        exclude: ^\.github/workflows/  # Allow GitHub Actions syntax
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict

  # GitHub Actions workflow validation
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        args: [-ignore, SC]  # Ignore shellcheck rules

  # Validate pyproject.toml structure
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.29.10
    hooks:
      - id: typos
        pass_filenames: false  # Check entire repo

  # Python code quality with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format
