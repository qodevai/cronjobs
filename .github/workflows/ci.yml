name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'

  test:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 🛑 Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.12.1

    - name: ⬇️ Checkout repo
      uses: actions/checkout@v4

    - name: 🐳 Build Docker image
      run: docker build -t cronjob-scheduler:test --target test .

    - name: 🔍 Run ruff check
      run: docker run --rm cronjob-scheduler:test uv run ruff check

    - name: ✨ Run ruff format check
      run: docker run --rm cronjob-scheduler:test uv run ruff format --check

    - name: 🔍 Run type checking
      run: docker run --rm cronjob-scheduler:test uv run pyright

    - name: 🧪 Run tests with coverage
      run: |
        docker run --name test-run cronjob-scheduler:test uv run pytest \
          --cov=cronjob_scheduler \
          --cov-report=xml \
          --cov-report=term \
          --durations=10 \
          -v

        docker cp test-run:/app/coverage.xml ./coverage.xml
        docker rm test-run

    - name: 📊 Upload coverage to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    needs: [changes, test]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: 🛑 Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.12.1

    - name: ⬇️ Checkout repo
      uses: actions/checkout@v4

    - name: 🐳 Build production Docker image
      run: docker build -t cronjob-scheduler:prod --target production .

    - name: 🧪 Smoke test production image
      run: |
        echo "Testing if production image can import modules..."
        docker run --rm cronjob-scheduler:prod uv run python -c "import cronjob_scheduler.main; import aiodocker; print('✅ All modules import successfully')"

    - name: 🚀 Start services with e2e profile
      run: |
        docker compose --profile e2e up -d
        sleep 5

    - name: ✅ Verify scheduler started successfully
      run: |
        if ! docker compose ps scheduler | grep -q "Up"; then
          echo "❌ Scheduler container failed to start!"
          docker compose logs scheduler
          exit 1
        fi
        echo "✅ Scheduler container is running"

    - name: 📋 Check scheduler is running
      run: docker compose logs scheduler

    - name: ⏳ Wait for jobs to execute
      run: |
        echo "Waiting 10 seconds for cronjobs to execute..."
        sleep 10

    - name: ✅ Verify jobs executed
      run: |
        echo "Checking if cronjob created output file..."
        docker compose exec -T example-worker cat /cronjobs.log
        echo "Verifying multiple executions occurred..."
        docker compose exec -T example-worker sh -c "test -f /cronjobs.log && wc -l /cronjobs.log"

    - name: 📋 Show scheduler logs
      if: always()
      run: docker compose logs scheduler

    - name: 🧹 Cleanup
      if: always()
      run: docker compose --profile e2e down -v
