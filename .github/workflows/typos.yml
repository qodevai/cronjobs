name: Typos

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typos:
    name: Check for typos
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🔤 Check for typos
        uses: crate-ci/typos@v1.29.10
